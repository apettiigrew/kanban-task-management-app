name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci
      - name: Validate Commit Messages
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found, checking last commit only"
            npx commitlint --last
          else
            echo "Checking commits from $LAST_TAG to HEAD"
            npx commitlint --from=$LAST_TAG --to=HEAD
          fi
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Run Semantic Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release > release.log 2>&1 || true
          
          if grep -q "Published release" release.log; then
            VERSION=$(jq -r '.version' package.json)
            echo "RELEASE_CREATED=true" >> $GITHUB_ENV
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "RELEASE_CREATED=false" >> $GITHUB_ENV
          fi

      - name: Create Pull Request
        if: env.RELEASE_CREATED == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/${{ env.VERSION }}
          base: main
          title: "chore: merging release ${{ env.VERSION }}"
          body: "This commit will merge the release udpates"
